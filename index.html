<!DOCTYPE html>
<html lang="pt-br">
    <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Alice&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Local Turistico</title>
</head>
<body>
    <header>
        <nav>
            <a href="#praias">Praias</a>
            <a href="">Culinária</a>
            <a href="">Pousadas</a>
        </nav>
    </header>
    <main>
        <section id="hero">
            <div class="container">
                <h1>
                    Icaraí de <span>Amontada</span> <br> O <span>Paraíso</span> do Litoral Cearense 
                </h1>
                <p id="descricao">
                    Um destino <span>encantador</span> que combina paisagens naturais, tranquilidade e uma atmosfera <span>acolhedora</span>. A vila atrai visitantes que <span>buscam</span> relaxar, explorar a natureza e viver <span>experiências</span> únicas à beira-mar.
                </p>
                <button class="btn">
                    <a href="https://icaraideamontada.com.br/" target="_blank">
                        Saiba Mais
                    </a>
                </button>
            </div>
            <aside class="galeria">
                <figure>
                    <img 
                    src="assets/moitas-amontada.png" 
                    alt="Imagem de Moitas em Amontada">
                </figure>
                <figure class="destaque">
                    <img src="https://www.melhoresdestinos.com.br/wp-content/uploads/2023/01/icaraizinho-de-amontada-40-820x615.jpg" alt="Praia de Icaraí">
                </figure>
                <figure>
                    <img src="assets/caetanos.png" alt="Praia de Caetanos">
                </figure>
            </aside>
        </section>
    </main>
</body>
</html>
